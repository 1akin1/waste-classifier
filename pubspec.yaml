name: waste_classifier
description: "Waste type classifier — classifies a camera/gallery image on-device with TFLite."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_litert: ^1.0.3    # maintained fork of tflite_flutter; bundles TFLite 2.20 runtime (model needs TF 2.17+)
  image_picker: ^1.0.7      # camera + gallery picker
  image: ^4.1.7             # image decode/resize

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/waste_classifier.tflite
    - assets/labels.txt